{% extends "base.html" %}
{% block title %}Check your email · innerscript{% endblock %}
{% block content %}
<section class="form wrap">
  <h1 class="h-display">Check your email</h1>
  <p class="muted-sm mb-20">If an account matches that email, a password reset link is on its way. Follow it to set a new password.</p>
  <p class="muted-sm mt-20"><a href="{% url 'account_login' %}" class="link-pink">Back to sign in</a></p>
</section>
{% endblock %}
