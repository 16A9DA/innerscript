{% extends "base.html" %}
{% block title %}Delete post · InnerScript{% endblock %}
{% block content %}
<section class="form wrap">
  <h1 class="h-display mb-12">Delete this post?</h1>
  <p class="muted-sm mb-24">"{{ post.title }}" and its replies/likes will be permanently removed. This cannot be undone.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-lg bg-pink">Permanently delete post</button>
    <a href="{{ post.get_absolute_url }}" class="link-pink ml-16">Cancel</a>
  </form>
</section>
{% endblock %}
