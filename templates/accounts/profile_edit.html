{% extends "base.html" %}
{% block title %}Edit profile · innerscript{% endblock %}
{% block content %}
<section class="form wrap">
  <h1 class="h-display mb-24">Edit profile</h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {{ field.errors }}
    {% endfor %}
    <div class="mt-24"><button type="submit" class="btn btn-lg">Save</button></div>
  </form>
  <p class="sep-top">
    <a href="{% url 'accounts:account_delete' %}" class="muted-sm text-pink">Delete my account</a>
  </p>
</section>
{% endblock %}
